      <stop offset="100%" stop-color="#ff6f61"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="24" flood-color="#ff885f" flood-opacity="0.28"/>
    </filter>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="32" stdDeviation="34" flood-color="#020305" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1400" height="560" fill="url(#night)"/>
  <circle cx="236" cy="92" r="170" fill="#ff9966" fill-opacity="0.10"/>
